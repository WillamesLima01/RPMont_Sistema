services:
  db:
    image: postgres:17
    container_name: gerenciador_de_equinos_DB
    environment:
      POSTGRES_DB: gerenciador_de_equinos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gerenciador_de_equinos"]
      interval: 5s
      timeout: 5s
      retries: 10
